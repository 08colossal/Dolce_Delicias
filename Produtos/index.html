<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=s, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="produtos.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>
    <!--&  MENU  -->


    <!--&  CORPO  -->
    <div class="tela">
        <div class="barra-filtros">
            <div id="tags-container" class="tags-container"></div>
            
            <div class="menu-dropdown">
                <button id="btn-filtros-gatilho" class="btn-filtros">Filtros ▾</button>
                <div id="dropdown-conteudo" class="dropdown-conteudo">
                    <div class="dropdown-secao">

<!--mistos assados doces sucos combo-frito combo-assado combo-doce omidas -> assados doces mistos executivos | Bebidas -> refrigerantes agua sucos cafe -->

                        <h4>Categorias</h4>
                        
                        <h3>Comidas</h3>
                    <!--<button class="opcao-filtro" data-valor="t-c">Todas as comidas</button>-->
                        <button class="opcao-filtro" data-valor="assados">Salgados</button>
                        <button class="opcao-filtro" data-valor="doces">Doces e sobremesas</button>
                        <button class="opcao-filtro" data-valor="mistos">Sanduíches / mistos</button>
                        <button class="opcao-filtro" data-valor="executivos">Executivos</button>
                        <button class="opcao-filtro" data-valor="combo-frito">Combos - salgados fritos</button>
                        <button class="opcao-filtro" data-valor="combo-assado">Combos - salgados assados</button>
                        <button class="opcao-filtro" data-valor="combo-doce">Combos - doces</button>
                        
                        <h3>Bebidas</h3>
                    <!--<button class="opcao-filtro" data-valor="t-b">Todas as bebidas</button>-->
                        <button class="opcao-filtro" data-valor="sucos">Sucos</button>
                        <button class="opcao-filtro" data-valor="agua">Águas</button>
                        <button class="opcao-filtro" data-valor="cafe">Cafés</button>
                        <button class="opcao-filtro" data-valor="refrigerante">Refrigerantes</button>


                    </div>
                </div>
            </div>
        </div>

        <hr class="linha-filtros">

        <div class="secao-unidade" id="secao-bpk">
            <h2>𖦹๋࣭⭑ Cardápio Geral</h2>
            <div id="container-bpk" class="produtos-grid"></div>
            <hr class="linha-filtros">
        </div>

        <div class="secao-unidade" id="secao-cantina">
            <h2>𖦹๋࣭⭑ Cantina Biopark</h2>
            <div id="container-cantina" class="produtos-grid"></div>
            <hr class="linha-filtros">
        </div>

        <div class="secao-unidade" id="secao-encomendas">
            <h2>𖦹๋࣭⭑ Encomendas</h2>
            <div id="container-encomendas" class="produtos-grid"></div>
            <hr class="linha-filtros">
        </div>

    </div>

    <!--& RODAPÉ  -->
